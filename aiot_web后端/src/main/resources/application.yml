spring:
  application:
    name: aicourse-master
  datasource:
    url: jdbc:mysql://localhost:3306/aicourse_master?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis:
  type-aliases-package: com.aicoursemaster.domain
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

ai:
  rag:
    base-url: http://localhost:8000
    rag-chat-path: /api/rag/chat
    llm-generate-path: /api/llm/generate
    courseware-generate-path: /api/courseware/generate
    health-path: /health
    default-top-k: 5
    connect-timeout-seconds: 10
    read-timeout-seconds: 300

app:
  admin:
    # 管理端接口（敏感词、监控、Redis 清理）需在 Header 携带：X-Admin-Token
    token: dev-admin-token
  auth:
    # HS256 密钥，至少 32 字节；生产务必修改
    jwt-secret: "dev-only-change-me-use-long-random-secret-key-please"
    jwt-expiration-seconds: 604800
    # 未带 Bearer 时是否允许用 X-User-Id 识别用户（仅建议开发/联调；生产建议 false）
    allow-header-user-id: true
    # 头像上传返回绝对 URL 时使用（例如反向代理场景）；不配置则按请求 Host/Port 拼接
    # public-base-url: http://localhost:8080

